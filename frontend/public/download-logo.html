<!DOCTYPE html>
<html>
<head><title>TravelSync Pro — Logo</title></head>
<body style="background:#111827;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui;gap:24px;">
  <h2 style="color:white;font-weight:700;margin:0;">TravelSync Pro Logo</h2>
  <canvas id="c" width="512" height="512" style="border-radius:24px;box-shadow:0 8px 40px rgba(0,0,0,0.4);"></canvas>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
    <button onclick="download(256)" style="padding:10px 20px;background:#1f2937;color:#9ca3af;border:1px solid #374151;border-radius:10px;font-size:13px;cursor:pointer;">256px</button>
    <button onclick="download(512)" style="padding:10px 20px;background:#4CC9F0;color:#0a1628;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">512px</button>
    <button onclick="download(1024)" style="padding:10px 20px;background:#4CC9F0;color:#0a1628;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">1024px</button>
    <button onclick="download(2048)" style="padding:10px 20px;background:#8b5cf6;color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">2048px 4K</button>
  </div>
  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');

    function draw(size) {
      c.width = size; c.height = size;
      const s = size / 512;
      ctx.scale(s, s);
      const cx = 256, cy = 256;

      // === Background — premium deep gradient ===
      const bg = ctx.createRadialGradient(cx, cy * 0.5, 0, cx, cy, 340);
      bg.addColorStop(0, '#162b50');
      bg.addColorStop(0.4, '#0e1f3d');
      bg.addColorStop(1, '#060d1b');
      ctx.beginPath(); ctx.roundRect(0, 0, 512, 512, 60); ctx.fillStyle = bg; ctx.fill();

      // === Globe wireframe ===
      ctx.save();
      ctx.strokeStyle = '#4CC9F0';
      ctx.lineWidth = 0.8;
      ctx.globalAlpha = 0.04;
      for (let i = -3; i <= 3; i++) {
        ctx.beginPath(); ctx.ellipse(cx, cy, 40 + Math.abs(i) * 38, 155, 0, 0, Math.PI * 2); ctx.stroke();
      }
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath(); ctx.ellipse(cx, cy, 155, 35 + Math.abs(i) * 42, 0, 0, Math.PI * 2); ctx.stroke();
      }
      ctx.restore();

      // === Orbit rings ===
      ctx.save();
      ctx.strokeStyle = 'rgba(76,201,240,0.05)';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(cx, cy, 215, 0, Math.PI * 2); ctx.stroke();
      ctx.strokeStyle = 'rgba(139,92,246,0.04)';
      ctx.beginPath(); ctx.arc(cx, cy, 235, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();

      // === Ambient glows ===
      drawGlow(ctx, 140, 100, 160, 'rgba(76,201,240,0.09)');
      drawGlow(ctx, 400, 420, 130, 'rgba(139,92,246,0.07)');
      drawGlow(ctx, 400, 100, 100, 'rgba(245,158,11,0.04)');
      drawGlow(ctx, cx, cy, 100, 'rgba(76,201,240,0.03)');

      // === Flight route arc ===
      ctx.save();
      ctx.strokeStyle = 'rgba(76,201,240,0.18)';
      ctx.lineWidth = 1.8;
      ctx.setLineDash([5, 4]);
      ctx.beginPath(); ctx.moveTo(72, 365); ctx.bezierCurveTo(140, 190, 310, 115, 430, 108); ctx.stroke();
      ctx.setLineDash([]);
      // Waypoints
      [[72,365,3.5,'rgba(76,201,240,0.25)'],[200,200,3,'rgba(76,201,240,0.35)'],[430,108,5,'#4CC9F0']].forEach(([x,y,r,col]) => {
        ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
      });
      ctx.restore();

      // === Airplane ===
      ctx.save();
      ctx.translate(432, 105);
      ctx.rotate(-22 * Math.PI / 180);
      ctx.scale(1.4, 1.4);
      const pg = ctx.createLinearGradient(-10, 0, 48, 0);
      pg.addColorStop(0, '#38b6db'); pg.addColorStop(1, '#4CC9F0');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(48, -3.5); ctx.lineTo(50, 0); ctx.lineTo(48, 3.5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4CC9F0';
      ctx.beginPath(); ctx.moveTo(15, -22); ctx.lineTo(30, -3.5); ctx.lineTo(10, -3.5); ctx.fill();
      ctx.beginPath(); ctx.moveTo(15, 22); ctx.lineTo(30, 3.5); ctx.lineTo(10, 3.5); ctx.fill();
      ctx.fillStyle = 'rgba(76,201,240,0.5)';
      ctx.beginPath(); ctx.moveTo(-8, -11); ctx.lineTo(4, -2); ctx.lineTo(-10, -2); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-8, 11); ctx.lineTo(4, 2); ctx.lineTo(-10, 2); ctx.fill();
      ctx.restore();

      // === Service icons ===
      // Hotel (violet)
      drawServiceIcon(ctx, 82, 150, 19, '#8b5cf6', (c) => {
        c.strokeRect(-5, -3, 10, 7); c.fillRect(-5, -6, 10, 3);
        c.fillRect(-3, 0, 2, 2); c.fillRect(1, 0, 2, 2);
      });
      // Train (emerald)
      drawServiceIcon(ctx, 52, 262, 17, '#10b981', (c) => {
        c.strokeRect(-4, -5, 8, 8);
        c.fillRect(-3, -3, 6, 2);
        c.beginPath(); c.arc(-2, 5, 1.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(2, 5, 1.5, 0, Math.PI*2); c.fill();
      });
      // Bus (amber)
      drawServiceIcon(ctx, 74, 368, 17, '#f59e0b', (c) => {
        c.strokeRect(-5, -5, 10, 8);
        c.fillRect(-4, -3, 8, 3);
        c.beginPath(); c.arc(-3, 5, 1.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(3, 5, 1.5, 0, Math.PI*2); c.fill();
      });
      // Receipt (cyan)
      drawServiceIcon(ctx, 418, 400, 17, '#4CC9F0', (c) => {
        c.strokeRect(-4, -6, 8, 12);
        c.fillRect(-2, -3, 4, 1); c.fillRect(-2, -0.5, 4, 1); c.fillRect(-2, 2, 3, 1);
      });
      // Map pin (rose)
      drawServiceIcon(ctx, 450, 280, 18, '#f43f5e', (c) => {
        c.beginPath();
        c.moveTo(0, -7); c.bezierCurveTo(-5.5, -7, -7.5, -3, -7.5, 1);
        c.bezierCurveTo(-7.5, 6.5, 0, 11, 0, 11);
        c.bezierCurveTo(0, 11, 7.5, 6.5, 7.5, 1);
        c.bezierCurveTo(7.5, -3, 5.5, -7, 0, -7);
        c.fill();
        c.fillStyle = 'rgba(6,13,27,0.5)';
        c.beginPath(); c.arc(0, 0, 2.8, 0, Math.PI*2); c.fill();
      });
      // Weather (orange sun + cloud)
      drawServiceIcon(ctx, 442, 188, 16, '#fb923c', (c) => {
        c.beginPath(); c.arc(2, -2, 4.5, 0, Math.PI*2); c.fill();
        c.fillStyle = 'rgba(255,255,255,0.55)';
        c.beginPath(); c.arc(-2, 2.5, 3.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(3, 2.5, 3, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(0.5, 1.5, 3.2, 0, Math.PI*2); c.fill();
      });

      // === Main text: "TravelSync" ===
      ctx.save();
      ctx.shadowColor = 'rgba(76,201,240,0.3)';
      ctx.shadowBlur = 50;

      // "Travel" in white
      ctx.fillStyle = 'white';
      ctx.font = '300 62px "SF Pro Display", "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText('Travel', cx + 2, cy - 8);

      // "Sync" in cyan bold
      ctx.fillStyle = '#4CC9F0';
      ctx.font = '800 62px "SF Pro Display", "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('Sync', cx + 6, cy - 8);

      ctx.shadowBlur = 0;
      ctx.restore();

      // === "Pro" badge ===
      const badgeX = cx + 108, badgeY = cy - 30;
      const badgeGrad = ctx.createLinearGradient(badgeX - 16, badgeY, badgeX + 16, badgeY);
      badgeGrad.addColorStop(0, '#8b5cf6'); badgeGrad.addColorStop(1, '#a78bfa');
      ctx.fillStyle = badgeGrad;
      roundRect(ctx, badgeX - 16, badgeY - 8, 32, 16, 4);
      ctx.fillStyle = 'white';
      ctx.font = '800 9px "SF Pro Display", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('PRO', badgeX, badgeY);

      // === Cyan accent line under text ===
      const lineGrad = ctx.createLinearGradient(cx - 90, 0, cx + 90, 0);
      lineGrad.addColorStop(0, 'transparent'); lineGrad.addColorStop(0.1, 'rgba(76,201,240,0.5)');
      lineGrad.addColorStop(0.9, 'rgba(76,201,240,0.5)'); lineGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = lineGrad;
      roundRect(ctx, cx - 90, cy + 22, 180, 2, 1);

      // === Tagline ===
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '500 11.5px "SF Pro Display", system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('A I - P O W E R E D   C O R P O R A T E   T R A V E L', cx, cy + 44);

      // === Stars ===
      [[120,78,2.2],[395,68,1.8],[105,440,1.6],[458,448,2.2],[215,52,1.2],
       [468,148,1],[55,195,1],[365,462,1.5],[48,380,0.8],[480,350,0.9]].forEach(([x,y,r]) => {
        ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.random() * 0.35})`;
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
      });

      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    function drawGlow(ctx, x, y, r, color) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, color); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g; ctx.fillRect(0, 0, 512, 512);
    }

    function drawServiceIcon(ctx, x, y, radius, color, iconFn) {
      ctx.save();
      ctx.translate(x, y);
      // Glow
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 1.5);
      glow.addColorStop(0, color.replace(')', ',0.08)').replace('rgb', 'rgba'));
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(-radius*2, -radius*2, radius*4, radius*4);
      // Circle bg
      ctx.fillStyle = color.replace(')', ',0.1)').replace('rgb', 'rgba').replace('#', '');
      ctx.fillStyle = hexToRGBA(color, 0.1);
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill();
      // Border
      ctx.strokeStyle = hexToRGBA(color, 0.3);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.stroke();
      // Icon
      ctx.strokeStyle = hexToRGBA(color, 0.7);
      ctx.fillStyle = hexToRGBA(color, 0.7);
      ctx.lineWidth = 1.5;
      iconFn(ctx);
      ctx.restore();
    }

    function hexToRGBA(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath(); ctx.fill();
    }

    draw(512);

    function download(size) {
      draw(size);
      const a = document.createElement('a');
      a.download = 'TravelSync-Pro-' + size + 'px.png';
      a.href = c.toDataURL('image/png');
      a.click();
      draw(512);
    }
  </script>
</body>
</html>
