steps:
  # Step 1: Build the Docker image (Dockerfile handles React build internally via multi-stage)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/travelsync-pro:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/travelsync-pro:latest
      - .

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/travelsync-pro:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/travelsync-pro:latest']

  # Step 3: Deploy to Cloud Run (asia-south1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - travelsync-pro
      - --image=gcr.io/$PROJECT_ID/travelsync-pro:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --set-env-vars=DEBUG=False,GCP_PROJECT_ID=$PROJECT_ID
      - >-
        --set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest,
        GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest,
        AMADEUS_CLIENT_ID=AMADEUS_CLIENT_ID:latest,
        AMADEUS_CLIENT_SECRET=AMADEUS_CLIENT_SECRET:latest,
        OPENWEATHER_API_KEY=OPENWEATHER_API_KEY:latest,
        OPEN_EXCHANGE_APP_ID=OPEN_EXCHANGE_APP_ID:latest,
        GOOGLE_VISION_API_KEY=GOOGLE_VISION_API_KEY:latest,
        FLASK_SECRET_KEY=FLASK_SECRET_KEY:latest,
        JWT_SECRET_KEY=JWT_SECRET_KEY:latest,
        DATABASE_URL=DATABASE_URL:latest

images:
  - 'gcr.io/$PROJECT_ID/travelsync-pro:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/travelsync-pro:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
